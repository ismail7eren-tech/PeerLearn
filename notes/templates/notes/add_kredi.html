{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card pro-card border-0 shadow-lg p-4 text-center">
                <div class="mb-4">
                    <i class="fas fa-wallet fa-4x text-success"></i>
                </div>
                <h2 class="fw-bold mb-3">Kredi Yükle</h2>
                <p class="text-muted mb-4">Mevcut Bakiyeniz: <span class="badge bg-primary rounded-pill px-3">{{ user.kredi }} Kredi</span></p>
                
                <div class="row g-3">
                    <div class="col-6">
                        <div class="card border-primary p-3 h-100 pro-hover shadow-sm">
                            <h4 class="fw-bold">20 Kredi</h4>
                            <p class="small text-muted mb-3">Başlangıç Paketi</p>
                            <button class="btn btn-primary rounded-pill w-100">Satın Al</button>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card border-warning p-3 h-100 pro-hover shadow-sm">
                            <h4 class="fw-bold">50 Kredi</h4>
                            <p class="small text-muted mb-3">Popüler Paket</p>
                            <button class="btn btn-warning rounded-pill w-100 fw-bold">Satın Al</button>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4 p-3 bg-light rounded-4 small text-secondary">
                    <i class="fas fa-lock me-2"></i> Güvenli ödeme altyapısı ile bakiyeniz anında yüklenir.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
