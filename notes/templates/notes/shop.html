{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold text-dark">Kredi Mağazası</h1>
        <p class="text-muted">İhtiyacınız olan krediyi seçin ve hemen başlayın.</p>
    </div>
    <div class="row g-4 justify-content-center">
        <div class="col-md-4 col-lg-3">
            <div class="card pro-card border-0 shadow-lg p-4 text-center border-top border-primary border-4">
                <h3 class="fw-bold text-primary">20 Kredi</h3>
                <hr>
                <button class="btn btn-primary w-100 rounded-pill">100 TL</button>
            </div>
        </div>
        <div class="col-md-4 col-lg-3">
            <div class="card pro-card border-0 shadow-lg p-4 text-center border-top border-warning border-4">
                <h3 class="fw-bold text-warning">50 Kredi</h3>
                <hr>
                <button class="btn btn-warning w-100 rounded-pill fw-bold">200 TL</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
