{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="card pro-card shadow-lg p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Tekrar Hoş Geldin</h3>
                <p class="text-muted small">Hesabına giriş yaparak devam et.</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-bold">Kullanıcı Adı</label>
                    <input type="text" name="username" class="form-control pro-input" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Şifre</label>
                    <input type="password" name="password" class="form-control pro-input" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill shadow-sm">Giriş Yap</button>
            </form>
            <div class="mt-4 text-center">
                <p class="small text-muted">Hesabın yok mu? <a href="{% url 'register' %}" class="text-decoration-none fw-bold">Kayıt Ol</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
