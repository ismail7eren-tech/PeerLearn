{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card pro-card border-0 shadow-lg p-4">
                <div class="text-center mb-4">
                    <div class="position-relative d-inline-block">
                        {% if user.profile_image %}
                            <img src="{{ user.profile_image.url }}" class="rounded-circle shadow" width="120" height="120" style="object-fit: cover; border: 4px solid #fff;">
                        {% else %}
                            <i class="fas fa-user-circle fa-7x text-secondary opacity-25"></i>
                        {% endif %}
                        <span class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle p-2 shadow-sm" style="cursor: pointer;">
                            <i class="fas fa-camera fa-xs"></i>
                        </span>
                    </div>
                    <h4 class="fw-bold mt-3 mb-0">{{ user.username }}</h4>
                    <p class="text-muted small">Profil Ayarları ve Bilgileri</p>
                </div>

                <hr class="opacity-10 mb-4">

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-dark">Profil Resmi</label>
                        <input type="file" name="profile_image" class="form-control pro-input">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-dark">Ad</label>
                            <input type="text" name="first_name" value="{{ user.first_name }}" class="form-control pro-input" placeholder="Adınız">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-dark">Soyad</label>
                            <input type="text" name="last_name" value="{{ user.last_name }}" class="form-control pro-input" placeholder="Soyadınız">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-dark">E-posta Adresi</label>
                        <input type="email" name="email" value="{{ user.email }}" class="form-control pro-input" placeholder="ornek@mail.com">
                    </div>

                    <div class="alert bg-light border-0 rounded-4 p-3 mb-4">
                        <div class="d-flex align-items-center text-primary small fw-bold mb-1">
                            <i class="fas fa-info-circle me-2"></i> Hesap Bilgisi
                        </div>
                        <div class="text-muted small">
                            Kullanıcı adınızı değiştirmek için sistem yöneticisi ile iletişime geçin.
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                            <i class="fas fa-save me-2"></i> Değişiklikleri Kaydet
                        </button>
                        <a href="{% url 'password_change' %}" class="btn btn-outline-secondary btn-sm rounded-pill mt-2">
                            <i class="fas fa-key me-1"></i> Şifre Değiştir
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
